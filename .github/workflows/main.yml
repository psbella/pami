name: PAMI Auto-Update

on:
  schedule:
    - cron: '0 18 * * 3'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install cheerio xlsx

      - name: Ejecutar script de actualización
        run: node scripts/update-vademecum.js

      - name: Verificar cambios en medicamentos.json
        run: |
          if [ -f "medicamentos.json" ]; then
            echo "✅ medicamentos.json existe"
            cat medicamentos.json | head -c 200
          else
            echo "❌ medicamentos.json NO se generó"
            exit 1
          fi

      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'PAMI Data Bot'
          git config --global user.email 'bot@pami-data.ar'
          git add medicamentos.json
          git diff --staged --quiet || git commit -m "Auto-update: Vademécum PAMI ($(date +'%d/%m/%Y'))"
          git push
