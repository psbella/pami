name: PAMI Auto-Update

on:
  schedule:
    - cron: '0 0 * * 1' # Se ejecuta automáticamente todos los lunes a las 00:00 UTC
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install cheerio xlsx

      - name: Ejecutar script de actualización
        run: node scripts/update-vademecum.js

      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'PAMI Data Bot'
          git config --global user.email 'bot@pami-data.ar'
          git add medicamentos.json
          # Solo hace commit si hay cambios reales para evitar errores
          git commit -m "Auto-update: Vademécum PAMI ($(date +'%d/%m/%Y'))" || exit 0
          git push
          
