name: PAMI Auto-Update

on:
  schedule:
    - cron: '0 18 * * 3'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Instalar dependencias
        run: pip install openpyxl requests
      
      - name: Descargar y convertir
        run: python xls_to_JSON.py
      
      - name: Commit y push
        run: |
          git config user.name "PAMI Data Bot"
          git config user.email "bot@pami-data.ar"
          git add medicamentos.json
          git diff --staged --quiet || git commit -m "Auto-update: Vademécum PAMI ($(date +'%d/%m/%Y'))"
          git push
