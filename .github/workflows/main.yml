name: Convertir XLSX a JSON

on:
  push:
    paths:
      - '*.xlsx'           # Se activa cuando subís un XLSX
  workflow_dispatch:        # También manual

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Instalar dependencias
        run: pip install openpyxl
      
      - name: Convertir XLSX a JSON
        run: python xls_to_JSON.py
      
      - name: Commit y push
        run: |
          git config user.name "PAMI Data Bot"
          git config user.email "bot@pami-data.ar"
          git add medicamentos.json
          git diff --staged --quiet || git commit -m "Actualizar medicamentos.json ($(date +'%d/%m/%Y'))"
          git push