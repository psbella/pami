name: PAMI Auto-Update

on:
  schedule:
    - cron: '0 18 * * 3'   # Miércoles a las 18:00 UTC (15:00 GMT-3)
  workflow_dispatch:        # Ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install cheerio xlsx

      - name: Ejecutar script de actualización
        run: node scripts/update-vademecum.js

      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'PAMI Data Bot'
          git config --global user.email 'bot@pami-data.ar'
          git add medicamentos.json
          git commit -m "Auto-update: Vademécum PAMI ($(date +'%d/%m/%Y'))" || exit 0
          git push
