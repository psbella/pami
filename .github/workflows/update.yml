name: PAMI Auto-Update

on:
  schedule:
    - cron: '0 18 * * 3'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias
        run: npm install xlsx
      
      - name: Ejecutar script
        run: node scripts/update-vademecum.js
      
      - name: Commit y push
        run: |
          git config user.name "PAMI Data Bot"
          git config user.email "bot@pami-data.ar"
          git add medicamentos.json
          git diff --staged --quiet || git commit -m "Auto-update: Vademécum PAMI ($(date +'%d/%m/%Y'))"
          git push
